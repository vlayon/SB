services:
  snipbot-db:
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: unless-stopped
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q 'SELECT 1' -No || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  snipbot:
    build:
      context: .
      dockerfile: Core/Dockerfile
    restart: unless-stopped
    environment:
      BotConfig__EthereumRpcUrl: ${ETHEREUM_RPC_URL}
      BotConfig__PrivateKey: ${PRIVATE_KEY}
      BotConfig__WalletAddress: ${WALLET_ADDRESS}
      MOCK_EXECUTE_REAL_TRADE: "true"
      ConnectionStrings__DefaultConnection: "Server=snipbot-db,1433;Database=SnippBotDb;User Id=sa;Password=${SA_PASSWORD};"
    ports:
      - "8080:80"
    depends_on:
      snipbot-db:
        condition: service_healthy

volumes:
  sqldata: